services:
  - type: web
    name: techzu-api
    env: docker
    plan: free
    region: ohio
    # Context must be the root to see all folders
    dockerContext: .
    # Path to the Dockerfile relative to the root
    dockerfilePath: ./server/src/Dockerfile
    envVars:
      - key: ASPNETCORE_ENVIRONMENT
        value: Production
      - key: Jwt__Key
        value: 8Fh3KpL9sQ2wX7zA5vM1tR6yU8bC4nD0E9GkJpLq
      - key: ConnectionStrings__DefaultConnection
        value: ""