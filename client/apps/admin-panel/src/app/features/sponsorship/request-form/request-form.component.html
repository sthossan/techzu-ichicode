<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-lg-8">
            <div class="card shadow-lg rounded-4 p-4 p-md-5">
                <div class="mb-4">
                    <h2 class="fw-bold text-dark mb-1">Create Sponsorship Request</h2>
                    <p class="text-secondary">Fill in the details below to submit a new sponsorship proposal.</p>
                </div>

                <form [formGroup]="requestForm" (ngSubmit)="onSubmit()">
                    <div class="row g-4">
                        <div class="col-12">
                            <label class="form-label fw-semibold">Request Title</label>
                            <input type="text" class="form-control form-control-lg bg-light px-4 py-3"
                                formControlName="title" placeholder="e.g. Annual Tech Summit 2026 Sponsorship">
                        </div>

                        <div class="col-md-6">
                            <label class="form-label fw-semibold">Department</label>
                            <input type="text" class="form-control bg-light px-3 py-2"
                                formControlName="department" placeholder="e.g. Marketing">
                        </div>

                        <div class="col-md-6">
                            <label class="form-label fw-semibold">Sponsorship Type</label>
                            <select class="form-select bg-light px-3 py-2" formControlName="type">
                                <option *ngFor="let type of sponsorshipTypes" [value]="type">{{ type }}</option>
                            </select>
                        </div>

                        <div class="col-md-6">
                            <label class="form-label fw-semibold">Event Name</label>
                            <input type="text" class="form-control bg-light px-3 py-2"
                                formControlName="eventName" placeholder="Full name of the event">
                        </div>

                        <div class="col-md-6">
                            <label class="form-label fw-semibold">Event Date</label>
                            <input type="date" class="form-control bg-light px-3 py-2"
                                formControlName="eventDate">
                        </div>

                        <div class="col-md-12">
                            <label class="form-label fw-semibold">Requested Amount</label>
                            <div class="input-group">
                                <span class="input-group-text bg-light text-secondary pe-0">$</span>
                                <input type="number" class="form-control bg-light px-3 py-2"
                                    formControlName="requestedAmount" placeholder="0.00">
                            </div>
                        </div>

                        <div class="col-12">
                            <label class="form-label fw-semibold">Purpose</label>
                            <textarea class="form-control bg-light px-3 py-2" rows="4"
                                formControlName="purpose" placeholder="Describe the main objectives of this sponsorship..."></textarea>
                        </div>

                        <div class="col-12">
                            <label class="form-label fw-semibold">Expected Business Benefit</label>
                            <textarea class="form-control bg-light px-3 py-2" rows="3"
                                formControlName="expectedBusinessBenefit" placeholder="What value will this bring to the company?"></textarea>
                        </div>

                        <div class="col-12">
                            <label class="form-label fw-semibold">Document Upload (Optional)</label>
                            <div class="input-group">
                                <span class="input-group-text bg-light text-secondary pe-0"><i class="bi bi-file-earmark-arrow-up"></i></span>
                                <input type="file" class="form-control bg-light px-3 py-2"
                                    (change)="onFileSelected($event)" accept=".pdf,.doc,.docx,.jpg,.png">
                            </div>
                        </div>

                        <div class="col-12 mt-5">
                            <div class="d-flex flex-wrap gap-3">
                                <button type="submit" class="btn btn-primary btn-lg px-5 py-3 rounded-3 shadow-sm flex-grow-1 fw-bold"
                                    [disabled]="requestForm.invalid">
                                    Submit Request
                                </button>
                                <button type="button" class="btn btn-outline-secondary btn-lg px-4 py-3 rounded-3 flex-grow-1"
                                    [disabled]="requestForm.invalid" (click)="saveDraft()">
                                    Save as Draft
                                </button>
                                <button type="button" class="btn btn-light btn-lg px-4 py-3 rounded-3 flex-grow-0"
                                    routerLink="/sponsorship">
                                    Cancel
                                </button>
                            </div>
                        </div>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
